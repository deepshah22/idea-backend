spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ideadb}
    username: ${DB_USER:app}
    password: ${DB_PASSWORD:secret}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379
      ssl:
        enabled: false

server:
  port: 8080
  servlet:
    context-path: /api/v1

langchain4j:
  open-ai:
    chat-model:
      api-key: test-dummy-key
      model-name: gpt-4o-mini
      temperature: 0.7
      max-tokens: 1000
    embedding-model:
      api-key: test-dummy-key
      model-name: text-embedding-3-small

app:
  jwt:
    secret: test-secret-key-for-testing-only-32chars!
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  ai:
    cache-ttl-seconds: 86400
    embedding-cache-ttl-seconds: 604800
    similarity-threshold: 0.70
    max-results: 5
