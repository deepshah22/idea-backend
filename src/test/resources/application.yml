spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ideadb}
    username: ${DB_USER:app}
    password: ${DB_PASSWORD:secret}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379
      ssl:
        enabled: false

server:
  port: 8080
  servlet:
    context-path: /api/v1

app:
  jwt:
    secret: test-secret-key-for-testing-only-32chars!
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
