spring:
  application:
    name: idea-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ideadb}
    username: ${DB_USER:app}
    password: ${DB_PASSWORD:secret}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      # ElastiCache cluster endpoint — e.g. xxxx.serverless.use1.cache.amazonaws.com
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      # AUTH token — set only if your ElastiCache cluster has auth enabled
      password: ${REDIS_AUTH_TOKEN:}
      ssl:
        enabled: true

langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY}
      model-name: gpt-4o-mini
      temperature: 0.7
      max-tokens: 1000
    embedding-model:
      api-key: ${OPENAI_API_KEY}
      model-name: text-embedding-3-small

server:
  port: 8080
  servlet:
    context-path: /api/v1

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-32-chars!}
    expiration-ms: 86400000  # 24 hours
    refresh-expiration-ms: 604800000 # 7 days

  ai:
    cache-ttl-seconds: 86400             # 24h — AI response cache in ElastiCache
    embedding-cache-ttl-seconds: 604800  # 7d  — embedding vector cache
    similarity-threshold: 0.70           # minimum cosine similarity to return a result
    max-results: 5                       # top-N docs returned per query

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.idea: DEBUG
    dev.langchain4j: INFO
