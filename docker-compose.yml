version: "3.9"

# Local development only.
# Redis here mimics ElastiCache — production uses the real AWS endpoint.

services:

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ideadb
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d ideadb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Local Redis — stands in for ElastiCache during development.
  # TLS is disabled here; application-dev.yml sets spring.data.redis.ssl.enabled=false.
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_NAME: ideadb
      DB_USER: app
      DB_PASSWORD: secret
      REDIS_HOST: redis   # overridden in prod by real ElastiCache endpoint
      JWT_SECRET: dev-only-secret-key-not-for-production!!
      OPENAI_API_KEY: ${OPENAI_API_KEY:-dummy-key-for-dev}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
